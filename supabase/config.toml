# Configuración de Supabase local para Klarvo.
# Referencia: https://supabase.com/docs/guides/local-development/cli/config
project_id = "klarvo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Servidor de correo de pruebas (Inbucket). Los emails no se envían de verdad:
# se pueden ver en la interfaz web del puerto indicado.
[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000", "http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
# En local desactivamos la confirmación por email: el registro crea el usuario
# ya confirmado y dispara el trigger handle_new_user() al instante.
enable_confirmations = false
