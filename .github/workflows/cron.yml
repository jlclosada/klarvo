name: Cron

# Sustituye a los crons de vercel.json (solo funcionan en Vercel) para el
# despliegue en Netlify. GitHub Actions no garantiza precisión al minuto en
# `schedule` (puede haber retrasos de varios minutos, especialmente en repos
# gratuitos) — si expirar-reservas necesita cadencia exacta, considera un
# servicio de cron externo (p. ej. cron-job.org) apuntando a los mismos
# endpoints en su lugar.
on:
  schedule:
    - cron: '* * * * *'
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  expirar-reservas:
    if: github.event.schedule == '* * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Llamar a /api/cron/expirar-reservas
        run: |
          curl -sf -X GET "${{ vars.APP_URL }}/api/cron/expirar-reservas" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  enviar-recordatorios:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Llamar a /api/cron/enviar-recordatorios
        run: |
          curl -sf -X GET "${{ vars.APP_URL }}/api/cron/enviar-recordatorios" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
