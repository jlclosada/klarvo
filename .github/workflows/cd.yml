name: CD

# Despliegue continuo: al integrar en main (o publicar un tag vX.Y.Z),
# construye la imagen Docker y la publica en GitHub Container Registry (GHCR).
# Usa el GITHUB_TOKEN integrado: no requiere secretos externos.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APP_NAME=Klarvo
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

  # ---------------------------------------------------------------------------
  # Despliegue al servidor (opcional). Se activa solo si se configuran los
  # secretos DEPLOY_HOST, DEPLOY_USER y DEPLOY_SSH_KEY en el repositorio.
  # Hace pull de la imagen recién publicada y reinicia el contenedor por SSH.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to server (SSH)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop klarvo-app || true
            docker rm klarvo-app || true
            docker run -d --name klarvo-app --restart unless-stopped \
              -p 3000:3000 --env-file /etc/klarvo/.env \
              ghcr.io/${{ github.repository }}:latest

      - name: Skip notice
        if: ${{ vars.DEPLOY_ENABLED != 'true' }}
        run: echo "DEPLOY_ENABLED no está en 'true'. Imagen publicada en GHCR; despliegue por SSH omitido."
